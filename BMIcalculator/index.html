<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
    <h1>BMI calculator</h1>
    <form>
        <label for="height">Height in CM</label> <input type="number" id="height" required name="height" class="input">
        <label for="weight">Weight in KG</label> <input type="number" id="weight" required name="weight" class="input">
        <br>
        <button type="submit">Calculate</button>
    </form>
    <br>
    <div id="result">
        <span>Result</span>
    </div>
    <div id="weight-guide">
          <h3>BMI Weight Guide</h3>
          <p>Under Weight = Less than 18.6</p>
          <p>Normal Range = 18.6 and 24.9</p>
          <p>Overweight = Greater than 24.9</p>
    </div>
    </div>
</body>
<script src="main.js"></script>
</html>
